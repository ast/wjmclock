# wjmclock example configuration.
#
# Copy to one of:
#   - the path passed via `--config`
#   - $XDG_CONFIG_HOME/wjmclock/wjmclock.toml (or platform equivalent)
#   - ./wjmclock.toml in the current directory
#
# CLI flags (`--width`, `--height`, `--fullscreen`, `--no-cursor`) override
# anything set here.

[window]
width      = 1920
height     = 1080
fullscreen = false
no_cursor  = false
background = "#0a0a14"

# Map markers. Add as many as you like. Each marker takes either
#   locator = "JO67AQ"      # Maidenhead grid (2/4/6/8 chars)
#   lat = 57.7; lon = 12.0  # raw degrees (-90..=90, -180..=180)
# `kind` defaults to "dot". When `timezone` is set, the marker's local time
# is drawn beneath its text.
[[marker]]
locator  = "JO67AQ"
text     = "GÖTEBORG"
timezone = "Europe/Stockholm"

[[marker]]
lat      = -5.79
lon      = -35.21
text     = "NATAL"
timezone = "America/Recife"

# UTC time, top-left.
[[element]]
type     = "clock"
rect     = { x = 0.00, y = 0.00, w = 0.30, h = 0.22 }
timezone = "UTC"
format   = "24h"
color    = "#7df5d2"

# Operator callsign, top-centre. Subtitle is optional.
[[element]]
type     = "callsign"
rect     = { x = 0.30, y = 0.00, w = 0.40, h = 0.22 }
call     = "SM6WJM"
subtitle = "JO67AQ — GÖTEBORG"
color    = "#ffd66b"

# Local time, top-right.
[[element]]
type     = "clock"
rect     = { x = 0.70, y = 0.00, w = 0.30, h = 0.22 }
timezone = "Europe/Stockholm"
format   = "24h"
color    = "#f5d27d"

# World map with Geochron-style grayline across the bottom.
[[element]]
type            = "map"
rect            = { x = 0.0, y = 0.22, w = 1.0, h = 0.78 }
projection      = "equirectangular"
terminator      = true
day_color       = "#15233f"   # lit-ocean fill (must be brighter than night_color)
night_color     = "#04091e"   # deep navy of the night side
twilight_color  = "#ffb060"   # warm tint of the gray-line band
night_dim       = 0.85        # how dark the night side gets (0..1)
twilight_extent = 12.0        # 6 civil / 12 nautical (Geochron-like) / 18 astronomical
coast_color     = "#39c08c"
grid            = true
grid_color      = "#1c3a3a"
subsolar_marker = true
marker_color    = "#ff5577"
# Bundled raster basemap. "natural_earth" = Tom Patterson's Natural Earth III
# shaded relief. Omit for the flat day_color fill.
texture         = "natural_earth"
coastline       = false           # turn off vector coastlines if texture has its own
# Bundled raster overlaid on the night side, alpha-masked by solar elevation.
# "earth_at_night" = Earth at Night (city lights). When set, the terminator's
# deep-night dimming auto-fades to transparent so the lights stay visible.
night_texture   = "earth_at_night"
