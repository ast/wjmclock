# wjmclock example configuration.
#
# Copy to one of:
#   - the path passed via `--config`
#   - $XDG_CONFIG_HOME/wjmclock/wjmclock.toml (or platform equivalent)
#   - ./wjmclock.toml in the current directory
#
# CLI flags (`--width`, `--height`, `--fullscreen`, `--no-cursor`) override
# anything set here.

[window]
width      = 1920
height     = 1080
fullscreen = false
no_cursor  = false
background = "#0a0a14"

# The station QTH. Drawn on the map like any other marker, and used by the
# propagation widget as the "from" end of path predictions. Same shape as
# [[marker]]: location is a Maidenhead string or an inline { lat, lon } table.
[home]
location = "JO67AQ"
text     = "SHACK"
timezone = "Europe/Stockholm"

# Additional map markers. `location` accepts a Maidenhead locator string
# (2/4/6/8 chars) or an inline { lat, lon } table in decimal degrees. When
# `timezone` is set, the marker's local time is drawn beneath its text.
[[marker]]
location = { lat = -5.79, lon = -35.21 }
text     = "NATAL"
timezone = "America/Recife"

# UTC time, top-left.
[[element]]
type     = "clock"
rect     = { x = 0.00, y = 0.00, w = 0.30, h = 0.22 }
timezone = "UTC"
format   = "24h"
color    = "#7df5d2"

# Operator callsign, top-centre. Subtitle is optional.
[[element]]
type     = "callsign"
rect     = { x = 0.30, y = 0.00, w = 0.40, h = 0.22 }
call     = "SM6WJM"
subtitle = "JO67AQ — GÖTEBORG"
color    = "#ffd66b"

# Local time, top-right.
[[element]]
type     = "clock"
rect     = { x = 0.70, y = 0.00, w = 0.30, h = 0.22 }
timezone = "Europe/Stockholm"
format   = "24h"
color    = "#f5d27d"

# World map with Geochron-style grayline across the bottom.
[[element]]
type            = "map"
rect            = { x = 0.0, y = 0.22, w = 1.0, h = 0.78 }
projection      = "equirectangular"
terminator      = true
day_color       = "#15233f"   # lit-ocean fill (must be brighter than night_color)
night_color     = "#04091e"   # deep navy of the night side
twilight_color  = "#ffb060"   # warm tint of the gray-line band
night_dim       = 0.85        # how dark the night side gets (0..1)
twilight_extent = 12.0        # 6 civil / 12 nautical (Geochron-like) / 18 astronomical
coast_color     = "#39c08c"
grid            = true
grid_color      = "#1c3a3a"
subsolar_marker = true
marker_color    = "#ff5577"
# Bundled rasters: Natural Earth III shaded relief on the day side, Earth at
# Night (city lights) alpha-masked over the night side. The terminator's
# deep-night dimming auto-fades so the city lights stay visible.
texture         = true
coastline       = true           # turn off vector coastlines (the bundled texture has its own)

# HF propagation overlay (lower-right of the map). Pulls solar indices from
# NOAA SWPC and per-path MUF/LUF from KC2G prop.kc2g.com once an hour, in a
# worker thread. Requires [home] to be set. Comment out to disable.
[[element]]
type             = "propagation"
rect             = { x = 0.66, y = 0.55, w = 0.33, h = 0.43 }
band_conditions  = true     # global HF band ratings derived from SFI + K-index
path_predictions = true     # per-marker openings derived from KC2G ray-tracing
